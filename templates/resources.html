{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h3>Resources</h3>
  <a href="{{ url_for('create_resource') }}" class="btn btn-primary">New Resource</a>
</div>
<table class="table table-striped">
  <thead>
    <tr>
      <th>Name</th>
      <th>Type</th>
      <th>Capacity / Quantity</th>
      <th></th>
    </tr>
  </thead>
  <tbody>
    {% for resource in resources %}
    <tr>
      <td>{{ resource.name }}</td>
      <td>{{ resource.type }}</td>
      <td>{{ resource.capacity }}</td>
      <td>
        <a href="{{ url_for('edit_resource', resource_id=resource.id) }}" class="btn btn-sm btn-outline-secondary">Edit</a>
      </td>
    </tr>
    {% else %}
    <tr><td colspan="4">No resources yet.</td></tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
