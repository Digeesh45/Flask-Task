{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h3>Events</h3>
  <a href="{{ url_for('create_event') }}" class="btn btn-primary">New Event</a>
</div>
<table class="table table-striped">
  <thead>
    <tr>
      <th>Title</th>
      <th>Start</th>
      <th>End</th>
      <th>Attendance</th>
      <th></th>
    </tr>
  </thead>
  <tbody>
    {% for event in events %}
    <tr>
      <td>{{ event.title }}</td>
      <td>{{ event.start_time }}</td>
      <td>{{ event.end_time }}</td>
      <td>{{ event.expected_attendance or '-' }}</td>
      <td>
        <a href="{{ url_for('edit_event', event_id=event.id) }}" class="btn btn-sm btn-outline-secondary">Edit</a>
        <a href="{{ url_for('allocate', event_id=event.id) }}" class="btn btn-sm btn-outline-primary">Allocate</a>
      </td>
    </tr>
    {% else %}
    <tr><td colspan="5">No events yet.</td></tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
